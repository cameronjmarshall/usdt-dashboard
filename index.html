<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Morning Dashboard</title>

<style>
body { background:#0f172a; color:#e5e7eb; font-family:Arial; padding:20px }
.grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:12px }
.card { background:#111827; padding:12px; border-radius:10px }
.value { font-size:1.4rem; font-weight:bold }
.small { font-size:0.9rem; color:#94a3b8 }
.up { color:#22c55e }
.down { color:#ef4444 }
.warn { color:#f59e0b }

h1 { margin-bottom:10px }
h2 { margin-top:25px }

.news { margin-top:20px }
.news-item { margin-bottom:12px }
</style>
</head>

<body>

<h1>Crypto Morning Dashboard</h1>

<div class="grid">
  <div class="card">
    <div>USDT/USD</div>
    <div id="usdt" class="value">—</div>
    <div id="usdtDev" class="small"></div>
  </div>

  <div class="card">
    <div>USDC/USD</div>
    <div id="usdc" class="value">—</div>
    <div id="usdcDev" class="small"></div>
  </div>

  <div class="card">
    <div>USDC/USDT</div>
    <div id="pair" class="value">—</div>
    <div id="pairDev" class="small"></div>
  </div>

  <div class="card">
    <div>BTC/USD</div>
    <div id="btc" class="value">—</div>
    <div id="btcChange" class="small"></div>
  </div>

  <div class="card">
    <div>USDT Supply</div>
    <div id="usdtSupply" class="value">—</div>
  </div>

  <div class="card">
    <div>USDC Supply</div>
    <div id="usdcSupply" class="value">—</div>
  </div>

</div>

<h2>BTC/USDT Exchanges</h2>
<div id="exchanges"></div>

<h2>Crypto News</h2>
<div id="news"></div>

<select id="refresh">
  <option value="30000">30 sec</option>
  <option value="60000" selected>60 sec</option>
</select>

<script>

/***********************
 * DAILY INPUT SECTION *
 * ONLY EDIT THIS PART *
 ***********************/

const DAILY_NEWS = [
  {
    headline: "Paste headline here",
    body: "Short summary",
    source: "Source",
    url: "https://link.com"
  },
  {
    headline: "Paste headline here",
    body: "Short summary",
    source: "Source",
    url: "https://link.com"
  }
];

/* END DAILY INPUT */


/* FUNCTIONS */

function bps(v) {
  return ((v - 1) * 10000).toFixed(1) + " bps";
}

function fmt(v) {
  return Number(v).toLocaleString(undefined, {maximumFractionDigits:4});
}

function fmtSupply(v) {
  return (v/1e9).toFixed(2) + "bn";
}

function clsBps(val) {
  val = Math.abs(val)
  if (val > 20) return "down"
  if (val > 10) return "warn"
  return ""
}

/* DATA FETCH */

async function load() {
  try {
    const cg = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=tether,usd-coin,bitcoin");
    const data = await cg.json();

    const map = {};
    data.forEach(x => map[x.id] = x);

    const usdt = map["tether"].current_price;
    const usdc = map["usd-coin"].current_price;

    document.getElementById("usdt").innerText = "$" + fmt(usdt);
    document.getElementById("usdc").innerText = "$" + fmt(usdc);

    document.getElementById("usdtDev").innerText = bps(usdt);
    document.getElementById("usdcDev").innerText = bps(usdc);

    document.getElementById("usdtDev").className = clsBps(usdt-1);
    document.getElementById("usdcDev").className = clsBps(usdc-1);

    document.getElementById("btc").innerText = "$" + map["bitcoin"].current_price.toFixed(0);
    document.getElementById("btcChange").innerText = map["bitcoin"].price_change_percentage_24h.toFixed(2) + "%";

    document.getElementById("usdtSupply").innerText = fmtSupply(map["tether"].circulating_supply);
    document.getElementById("usdcSupply").innerText = fmtSupply(map["usd-coin"].circulating_supply);

    /* Kraken pair */
    const k = await fetch("https://api.kraken.com/0/public/Ticker?pair=USDCUSDT");
    const kd = await k.json();
    const key = Object.keys(kd.result)[0];
    const pair = Number(kd.result[key].c[0]);

    document.getElementById("pair").innerText = pair.toFixed(4);
    document.getElementById("pairDev").innerText = bps(pair);

    /* Exchanges */
    const ex = [
      ["Binance", "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT", x => x.price],
      ["OKX", "https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT", x => x.data[0].last],
      ["Kraken", "https://api.kraken.com/0/public/Ticker?pair=XBTUSDT", x => x.result[Object.keys(x.result)[0]].c[0]]
    ];

    let arr = [];

    for (let e of ex) {
      try {
        const r = await fetch(e[1]);
        const j = await r.json();
        const price = Number(e[2](j));
        arr.push([e[0], price]);
      } catch {}
    }

    let html = "";
    arr.forEach(x => {
      html += `<div>${x[0]}: $${x[1].toFixed(2)}</div>`;
    });

    document.getElementById("exchanges").innerHTML = html;

  } catch {
    console.log("API issue")
  }
}

/* NEWS RENDER */

function renderNews() {
  let html = "";

  DAILY_NEWS.forEach(n => {
    if (!n.headline) return;

    html += `
      <div class="news-item">
        <a href="${n.url}" target="_blank">${n.headline}</a><br>
        <span class="small">${n.body}</span><br>
        <span class="small">${n.source}</span>
      </div>
    `;
  });

  document.getElementById("news").innerHTML = html;
}

/* INIT */

load();
renderNews();

let t;

function start() {
  clearInterval(t);
  t = setInterval(load, document.getElementById("refresh").value);
}

document.getElementById("refresh").addEventListener("change", start);

start();

</script>

</body>
</html>
