<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Morning Dashboard</title>

<style>
:root {
  --bg:#0f172a; --bg2:#020617; --card:rgba(17,24,39,0.82);
  --card2:rgba(255,255,255,0.03); --muted:#94a3b8; --text:#e5e7eb;
  --accent:#22c55e; --warn:#f59e0b; --danger:#ef4444;
  --border:rgba(255,255,255,0.08); --shadow:0 10px 30px rgba(0,0,0,0.25);
}
*{box-sizing:border-box}
body{
  margin:0;font-family:Inter,Arial;background:linear-gradient(180deg,var(--bg2),var(--bg));
  color:var(--text)
}
.wrap{max-width:1480px;margin:auto;padding:24px}
.header{display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:18px}
.title h1{margin:0}
.title p{color:var(--muted)}
.badge{display:flex;gap:8px;padding:10px;border:1px solid var(--border);border-radius:999px}
.dot{width:10px;height:10px;background:var(--accent);border-radius:50%}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px}
.grid-two{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;margin-bottom:16px}
.subgrid-2,.subgrid-3{display:grid;gap:12px}
.subgrid-2{grid-template-columns:repeat(2,1fr)}
.subgrid-3{grid-template-columns:repeat(3,1fr)}
.metric{background:var(--card2);padding:16px;border-radius:16px}
.label{color:var(--muted)}
.value{font-size:1.4rem;font-weight:700}
.small{color:var(--muted);font-size:0.9rem}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid var(--border)}
.mono{font-variant-numeric:tabular-nums}
@media(max-width:1100px){
  .grid-two,.subgrid-2,.subgrid-3{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="wrap">

<div class="header">
  <div class="title">
    <h1>Crypto Morning Dashboard</h1>
    <p>Core market view: stablecoins, BTC and exchange pricing.</p>
  </div>

  <div class="badge">
    <span class="dot"></span>
    <span id="statusText">Connecting…</span>
  </div>
</div>

<div class="grid-two">

<div class="card">
  <h2>Stablecoins</h2>
  <div class="subgrid-3">
    <div class="metric">
      <div class="label">USDT/USD</div>
      <div id="usdtPrice" class="value mono">—</div>
      <div id="usdtDev" class="small">—</div>
    </div>

    <div class="metric">
      <div class="label">USDC/USD</div>
      <div id="usdcPrice" class="value mono">—</div>
      <div id="usdcDev" class="small">—</div>
    </div>

    <div class="metric">
      <div class="label">USDC/USDT</div>
      <div id="usdcUsdtPrice" class="value mono">—</div>
      <div id="usdcUsdtDev" class="small">—</div>
    </div>
  </div>
</div>

<div class="card">
  <h2>BTC</h2>
  <div class="subgrid-2">
    <div class="metric">
      <div class="label">Price</div>
      <div id="btcPrice" class="value mono">—</div>
    </div>
    <div class="metric">
      <div class="label">24h</div>
      <div id="btcChange24" class="value mono">—</div>
    </div>
  </div>
</div>

</div>

<div class="grid-two">

<div class="card">
  <h2>Exchange BTC/USDT</h2>
  <table>
    <thead>
      <tr>
        <th>Exchange</th>
        <th>Price</th>
      </tr>
    </thead>
    <tbody id="exchangeTableBody">
      <tr><td colspan="2">Loading…</td></tr>
    </tbody>
  </table>
</div>

<div class="card">
  <h2>Last Updated</h2>
  <div id="lastUpdated">—</div>
</div>

</div>

</div>

<script>
const els = {
  statusText: document.getElementById("statusText"),
  usdtPrice: document.getElementById("usdtPrice"),
  usdcPrice: document.getElementById("usdcPrice"),
  usdcUsdtPrice: document.getElementById("usdcUsdtPrice"),
  usdtDev: document.getElementById("usdtDev"),
  usdcDev: document.getElementById("usdcDev"),
  usdcUsdtDev: document.getElementById("usdcUsdtDev"),
  btcPrice: document.getElementById("btcPrice"),
  btcChange24: document.getElementById("btcChange24"),
  exchangeTableBody: document.getElementById("exchangeTableBody"),
  lastUpdated: document.getElementById("lastUpdated")
};

function fmt(v){ return v ? "$"+Number(v).toLocaleString() : "—"; }

async function fetchJSON(url){
  const r = await fetch(url, {cache:"no-store"});
  return r.json();
}

async function refresh(){
  try {
    els.statusText.textContent = "Live";

    const cg = await fetchJSON("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=tether,usd-coin,bitcoin");

    const m = {};
    cg.forEach(x => m[x.id] = x);

    els.usdtPrice.textContent = fmt(m.tether.current_price);
    els.usdcPrice.textContent = fmt(m["usd-coin"].current_price);
    els.btcPrice.textContent = fmt(m.bitcoin.current_price);
    els.btcChange24.textContent = m.bitcoin.price_change_percentage_24h.toFixed(2)+"%";

    const kraken = await fetchJSON("https://api.kraken.com/0/public/Ticker?pair=USDCUSDT");
    const kKey = Object.keys(kraken.result)[0];
    els.usdcUsdtPrice.textContent = kraken.result[kKey].c[0];

    const exchanges = [
      ["Binance","https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT",d=>d.price],
      ["OKX","https://www.okx.com/api/v5/market/ticker?instId=BTC-USDT",d=>d.data[0].last]
    ];

    let rows = "";
    for (const e of exchanges){
      try{
        const d = await fetchJSON(e[1]);
        rows += `<tr><td>${e[0]}</td><td>$${Number(e[2](d)).toLocaleString()}</td></tr>`;
      }catch{
        rows += `<tr><td>${e[0]}</td><td>—</td></tr>`;
      }
    }

    els.exchangeTableBody.innerHTML = rows;
    els.lastUpdated.textContent = new Date().toLocaleString();

  } catch {
    els.statusText.textContent = "Error";
  }
}

refresh();
setInterval(refresh,60000);
</script>
</body>
</html>
