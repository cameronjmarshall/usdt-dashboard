<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stablecoin Dashboard</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:#e5e7eb;
    padding:20px;
  }

  h1 { margin-bottom:10px; }

  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
  }

  .card {
    background:#111827;
    border-radius:12px;
    padding:15px;
    border:1px solid #1f2937;
  }

  .label {
    color:#94a3b8;
    font-size:0.9rem;
  }

  .value {
    font-size:1.6rem;
    margin-top:6px;
    font-weight:bold;
  }

  .up { color:#22c55e; }
  .down { color:#ef4444; }

  select {
    margin-top:15px;
    padding:8px;
    background:#111827;
    color:#e5e7eb;
    border:1px solid #1f2937;
  }
</style>
</head>

<body>

<h1>Stablecoin + BTC Dashboard</h1>

<div class="grid">
  <div class="card">
    <div class="label">USDT/USD</div>
    <div id="usdt" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">USDC/USD</div>
    <div id="usdc" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">USDT Supply</div>
    <div id="usdtSupply" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">USDC Supply</div>
    <div id="usdcSupply" class="value">—</div>
  </div>

  <div class="card">
    <div class="label">BTC/USD</div>
    <div id="btc" class="value">—</div>
    <div id="btcChange"></div>
  </div>
</div>

<select id="refresh">
  <option value="5000">5 sec</option>
  <option value="10000" selected>10 sec</option>
  <option value="30000">30 sec</option>
</select>

<script>
let timer;

function fmtNum(v) {
  if (v == null) return "—";
  return v.toLocaleString(undefined, { maximumFractionDigits: 4 });
}

function fmtBTC(v) {
  return "$" + fmtNum(v);
}

function fmtSupply(v) {
  return (v / 1e9).toFixed(2) + "bn";
}

function fmtPct(v) {
  const sign = v >= 0 ? "+" : "";
  return sign + v.toFixed(2) + "%";
}

async function fetchData() {
  const url = "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=tether,usd-coin,bitcoin";
  const res = await fetch(url);
  const data = await res.json();

  const map = {};
  data.forEach(c => map[c.id] = c);

  document.getElementById("usdt").textContent = "$" + fmtNum(map["tether"].current_price);
  document.getElementById("usdc").textContent = "$" + fmtNum(map["usd-coin"].current_price);

  document.getElementById("usdtSupply").textContent = fmtSupply(map["tether"].circulating_supply);
  document.getElementById("usdcSupply").textContent = fmtSupply(map["usd-coin"].circulating_supply);

  document.getElementById("btc").textContent = fmtBTC(map["bitcoin"].current_price);

  const change = map["bitcoin"].price_change_percentage_24h;
  const el = document.getElementById("btcChange");
  el.textContent = fmtPct(change);
  el.className = change >= 0 ? "up" : "down";
}

function start() {
  if (timer) clearInterval(timer);
  const ms = Number(document.getElementById("refresh").value);
  timer = setInterval(fetchData, ms);
}

document.getElementById("refresh").addEventListener("change", start);

fetchData();
start();
</script>

</body>
</html>
